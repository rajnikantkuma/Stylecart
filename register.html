<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="col-md-4 mx-auto card p-4 shadow">
        <h3 class="text-center">Register</h3>

        <input type="text" id="regUser" class="form-control mb-2" placeholder="Username">
        <input type="password" id="regPass" class="form-control mb-2" placeholder="Password">

        <button onclick="register()" class="btn btn-success w-100">Register</button>

        <p class="text-center mt-2">
            Already have account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script>
function register(){
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    let data = { username: user, password: pass };

    localStorage.setItem("user", JSON.stringify(data));

    alert("Registered Successfully ✅");
    window.location.href = "login.html";
}
</script>

</body>
</html>
