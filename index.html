<!DOCTYPE html>
<html>
<head>
    <title>StyleCart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Segoe UI'; }

        /* Cards */
        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card-img-top {
            height: 220px;
            object-fit: cover;
        }

        /* Flipkart Buttons */
        .btn-cart {
            background-color: #ff9f00;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            padding: 10px;
            border: none;
        }

        .btn-buy {
            background-color: #fb641b;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            padding: 10px;
            border: none;
        }

        /* Dark Mode */
        .dark-mode {
            background-color: #121212 !important;
            color: white;
        }

        .dark-mode .card {
            background-color: #1e1e1e;
        }

        .dark-mode .list-group-item {
            background-color: #1e1e1e;
            color: white;
        }

        /* Toggle */
        .switch {
            position: relative;
            width: 55px;
            height: 28px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            background-color: #ccc;
            border-radius: 34px;
            inset: 0;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .4s;
        }

        input:checked + .slider {
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- Logo Click = Home -->
    <h2 onclick="showCategories()" style="cursor:pointer;" class="text-center fw-bold">
        🛍️ StyleCart
    </h2>

    <!-- Dark Toggle -->
    <div class="d-flex justify-content-end align-items-center mb-3">
        ☀️
        <label class="switch mx-2">
            <input type="checkbox" id="themeToggle" onchange="toggleDark()">
            <span class="slider"></span>
        </label>
        🌙
    </div>

    <!-- Categories -->
    <div id="categories" class="row"></div>

    <!-- Products -->
    <div id="products" class="row"></div>

    <!-- Back -->
    <div class="text-center">
        <button id="backBtn" onclick="showCategories()" class="btn btn-dark" style="display:none;">
            ⬅ Back
        </button>
    </div>

        <h4>🛒 Cart</h4>
        <ul id="cart" class="list-group"></ul>
        <h5>Total: ₹ <span id="total">0</span></h5>
    </div> -->
